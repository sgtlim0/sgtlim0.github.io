name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/wiki/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: apps/wiki/.next/cache
          key: nextjs-wiki-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('apps/wiki/**') }}
          restore-keys: |
            nextjs-wiki-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-wiki-${{ runner.os }}-

      - name: Build Wiki
        run: npm run build:wiki

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/wiki/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
