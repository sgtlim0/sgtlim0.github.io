name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'apps/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.*'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'apps/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.*'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-pw
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.cache-pw.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.cache-pw.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=admin --project=hmg --project=wiki --project=user
        continue-on-error: false

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  e2e-cross-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[cross-browser]')
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit, mobile-chrome, mobile-safari]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-pw-xbrowser
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-xbrowser-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.cache-pw-xbrowser.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system deps
        if: steps.cache-pw-xbrowser.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run cross-browser E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
