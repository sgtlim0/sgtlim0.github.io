version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers: ["sgtlim0"]
    labels: ["dependencies"]
    groups:
      next-ecosystem:
        patterns: ["next", "next-*", "@next/*"]
      react-ecosystem:
        patterns: ["react", "react-dom", "@types/react*"]
      testing:
        patterns: ["vitest", "@vitest/*", "@testing-library/*", "playwright", "@playwright/*"]
      storybook:
        patterns: ["storybook", "@storybook/*"]
      linting:
        patterns: ["eslint", "eslint-*", "prettier", "typescript"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directory: "/apps/ai-core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["ci"]

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "monthly"
    labels: ["docker"]
