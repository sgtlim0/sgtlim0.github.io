openapi: 3.1.0
info:
  title: H Chat API
  description: |
    H Chat platform API specification covering two tiers:

    1. **AI Core** (FastAPI, Python) — Internal backend AI service at `http://localhost:8000`
    2. **User API** (Next.js API Routes) — Public-facing proxy at `http://localhost:3003/api`

    The User API validates requests with Zod schemas, enforces CSRF protection and
    rate limiting, then proxies to AI Core. Clients should only call the User API.

    Additionally, **Admin API** and **Auth API** endpoints are documented from MSW
    mock handlers (to be implemented with a real backend).
  version: 1.0.0
  contact:
    name: H Chat Team
  license:
    name: MIT

servers:
  - url: http://localhost:3003
    description: User App (Next.js proxy)
  - url: http://localhost:8000
    description: AI Core (FastAPI, internal)

tags:
  - name: chat
    description: Chat message endpoints (sync and SSE streaming)
  - name: analyze
    description: Text analysis — summarize, explain, research, translate
  - name: research
    description: Web research pipeline — search, crawl, summarize
  - name: health
    description: Health check and service status
  - name: csrf
    description: CSRF token issuance
  - name: auth
    description: Authentication (login, logout, current user)
  - name: admin
    description: Admin dashboard, users, settings, metrics
  - name: admin-enterprise
    description: Enterprise features — tenants, RBAC, SSO, marketplace
  - name: admin-ai
    description: AI engine management — RAG, prompts, benchmarks, analytics
  - name: admin-collaboration
    description: Alert rules, team chat rooms, messages
  - name: admin-advanced
    description: Fine-tuning, knowledge graph, voice (STT/TTS)
  - name: models
    description: LLM model catalog and API keys

# ─────────────────────────────────────────────
# Security Schemes
# ─────────────────────────────────────────────
components:
  securitySchemes:
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: |
        HMAC-signed CSRF token obtained from `GET /api/csrf`.
        Required on all POST/PUT/PATCH/DELETE requests.
        Format: `<uuid>.<timestamp>.<hmac-sha256>` (expires after 1 hour).
        Also sent as `csrf_token` httpOnly cookie (Double Submit Cookie pattern).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from `POST /api/auth/login`.

  # ─────────────────────────────────────────
  # Reusable Schemas
  # ─────────────────────────────────────────
  schemas:
    # --- Chat ---
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          minLength: 1

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 10000
          description: The user message to send.
        history:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          maxItems: 50
          default: []
          description: Previous conversation messages for context.
        use_compression:
          type: boolean
          default: true
          description: Enable prompt compression to reduce token usage.

    CompressionStats:
      type: object
      properties:
        compressed:
          type: boolean
        original_tokens:
          type: integer
        compressed_tokens:
          type: integer
        compression_ratio:
          type: number
          format: float

    ChatResponse:
      type: object
      properties:
        response:
          type: string
          description: The AI-generated reply.
        stats:
          $ref: '#/components/schemas/CompressionStats'

    # --- Analyze ---
    AnalyzeRequest:
      type: object
      required: [text, mode]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 50000
          description: Text to analyze.
        mode:
          type: string
          enum: [summarize, explain, research, translate]
          description: Analysis mode.
        url:
          type: string
          format: uri
          description: Optional source URL for context.
        title:
          type: string
          maxLength: 500
          description: Optional source title for context.

    AnalyzeResponse:
      type: object
      properties:
        result:
          type: string
          description: Analysis result text.
        mode:
          type: string
          enum: [summarize, explain, research, translate]

    # --- Research ---
    ResearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 1000
          description: Search query for the research pipeline.
        num_sources:
          type: integer
          minimum: 1
          maximum: 10
          default: 3
          description: Number of sources to crawl and summarize.

    SourceItem:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        snippet:
          type: string

    ResearchResponse:
      type: object
      properties:
        query:
          type: string
        summary:
          type: string
          description: AI-generated summary from all sources.
        sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceItem'
        num_sources_used:
          type: integer

    # --- Health ---
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        aiCore:
          type: boolean
          description: Whether AI Core backend is reachable.
        proxy:
          type: boolean
          description: Always true for the User API proxy.
        upstream:
          type: object
          description: Raw health data from AI Core (only when aiCore is true).

    AiCoreHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          example: ai-core
        version:
          type: string
          example: 0.1.0

    # --- CSRF ---
    CsrfTokenResponse:
      type: object
      properties:
        csrfToken:
          type: string
          description: Signed CSRF token to include in X-CSRF-Token header.

    # --- Common Errors ---
    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: Invalid request body
        details:
          type: object
          description: Zod flattened error details.

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    RateLimitError:
      type: object
      properties:
        error:
          type: string
          example: Too many requests. Please try again later.

    CsrfError:
      type: object
      properties:
        error:
          type: string
          example: Missing CSRF token

    # --- Auth ---
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, viewer, user]
        organization:
          type: string

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/User'

    # --- Admin ---
    AdminDashboard:
      type: object
      properties:
        stats:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              value:
                type: string
        modelUsage:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              value:
                type: number
              color:
                type: string

    AdminUser:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        status:
          type: string
          enum: [active, inactive]
        lastActive:
          type: string
          format: date

    RealtimeMetrics:
      type: object
      properties:
        activeUsers:
          type: integer
        requestsPerMinute:
          type: integer
        avgLatency:
          type: integer
          description: Average latency in ms.
        errorRate:
          type: number
          format: float

    # --- Models ---
    Model:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        inputPrice:
          type: number
          description: Price per 1M input tokens (USD).
        outputPrice:
          type: number
          description: Price per 1M output tokens (USD).
        contextWindow:
          type: integer

    # --- Wrapper ---
    ApiSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          description: Response payload (varies by endpoint).

  # ─────────────────────────────────────────
  # Reusable Headers
  # ─────────────────────────────────────────
  headers:
    X-RateLimit-Remaining:
      description: Number of requests remaining in the current window.
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Unix timestamp (seconds) when the rate limit window resets.
      schema:
        type: integer
    Retry-After:
      description: Seconds until the client can retry (on 429 responses).
      schema:
        type: integer

  # ─────────────────────────────────────────
  # Reusable Responses
  # ─────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request body (Zod validation failed).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    Forbidden:
      description: Missing or invalid CSRF token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CsrfError'
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          $ref: '#/components/headers/Retry-After'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
    ServiceUnavailable:
      description: AI Core backend is unreachable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              error: AI Core service unavailable

# ─────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────
paths:
  # ===================== Chat =====================
  /api/chat:
    post:
      tags: [chat]
      summary: Send a chat message
      description: |
        Validates request via Zod, proxies to AI Core `/chat`, returns the
        complete AI response with compression statistics.
      operationId: chat
      security:
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Successful chat response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/chat/stream:
    post:
      tags: [chat]
      summary: Stream chat response via SSE
      description: |
        Proxies SSE streaming from AI Core `/chat/stream`. Returns a
        `text/event-stream` response with tokens as `data:` frames.
        The final frame is `data: [DONE]`.

        **SSE format:**
        ```
        data: Hello
        data:  world
        data: [DONE]
        ```
      operationId: chatStream
      security:
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: SSE event stream of tokens.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each event is `data: <token>\n\n`.
                  Stream ends with `data: [DONE]\n\n`.
          headers:
            Cache-Control:
              schema:
                type: string
                example: no-cache
            Connection:
              schema:
                type: string
                example: keep-alive
            X-Accel-Buffering:
              schema:
                type: string
                example: 'no'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          description: No stream body from AI Core.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  # ===================== Analyze =====================
  /api/analyze:
    post:
      tags: [analyze]
      summary: Analyze text (summarize, explain, research, translate)
      description: |
        Validates request via Zod, proxies to AI Core `/analyze`.
        Used by the Chrome Extension popup for text analysis.

        **Modes:**
        - `summarize` — Concise summary of key points
        - `explain` — Easy-to-understand explanation
        - `research` — Additional context and related information
        - `translate` — Korean to English or English to Korean
      operationId: analyze
      security:
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
      responses:
        '200':
          description: Analysis result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  # ===================== Research =====================
  /api/research:
    post:
      tags: [research]
      summary: Web research pipeline
      description: |
        Validates request via Zod, enforces rate limiting (10 req/min),
        proxies to AI Core `/research`.

        Pipeline: web search -> crawl pages -> AI summarization.
      operationId: research
      security:
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResearchRequest'
      responses:
        '200':
          description: Research results with sources.
          headers:
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  # ===================== Health =====================
  /api/health:
    get:
      tags: [health]
      summary: Health check (User API proxy)
      description: |
        Checks AI Core reachability and returns aggregated status.
        Always returns 200 — `status` field indicates `ok` or `degraded`.
      operationId: healthCheck
      responses:
        '200':
          description: Health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ===================== CSRF =====================
  /api/csrf:
    get:
      tags: [csrf]
      summary: Get CSRF token
      description: |
        Issues an HMAC-signed CSRF token using the Double Submit Cookie pattern.
        - Sets `csrf_token` httpOnly cookie
        - Returns token in JSON body
        - Token expires after 1 hour
        - Rate limited: 30 req/min per IP

        The client must include the token in `X-CSRF-Token` header on all POST requests.
      operationId: getCsrfToken
      responses:
        '200':
          description: CSRF token issued.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: csrf_token=<uuid>.<timestamp>.<hmac>; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=3600
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfTokenResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  # ===================== Auth (MSW mock) =====================
  /api/auth/login:
    post:
      tags: [auth]
      summary: Login
      description: |
        Authenticate with email and password. Returns JWT token and user profile.

        **Demo credentials:** `admin@hchat.ai` / `Admin123!`
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Invalid credentials

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Logout
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  /api/auth/me:
    get:
      tags: [auth]
      summary: Get current user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'

  # ===================== Admin (MSW mock) =====================
  /api/admin/dashboard:
    get:
      tags: [admin]
      summary: Get admin dashboard data
      operationId: getAdminDashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard statistics and model usage.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AdminDashboard'

  /api/admin/users:
    get:
      tags: [admin]
      summary: List admin users
      operationId: getAdminUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUser'

  /api/admin/settings:
    get:
      tags: [admin]
      summary: Get admin settings
      operationId: getAdminSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      defaultModel:
                        type: string
                      maxTokens:
                        type: integer
                      theme:
                        type: string
                        enum: [light, dark, system]
                      language:
                        type: string
                        enum: [ko, en]
    put:
      tags: [admin]
      summary: Update admin settings
      operationId: updateAdminSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                defaultModel:
                  type: string
                maxTokens:
                  type: integer
                theme:
                  type: string
                language:
                  type: string
      responses:
        '200':
          description: Updated settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object

  /api/admin/realtime/metrics:
    get:
      tags: [admin]
      summary: Get realtime metrics
      operationId: getRealtimeMetrics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current system metrics.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/RealtimeMetrics'

  /api/admin/notifications:
    get:
      tags: [admin]
      summary: Get admin notifications
      operationId: getAdminNotifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        message:
                          type: string
                        type:
                          type: string
                          enum: [info, warning, error]
                        read:
                          type: boolean
                        createdAt:
                          type: string
                          format: date-time

  /api/admin/widgets/layout:
    get:
      tags: [admin]
      summary: Get dashboard widget layout
      operationId: getWidgetLayout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Widget layout configuration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      layout:
                        type: array
                      widgets:
                        type: array

  /api/admin/workflows:
    get:
      tags: [admin]
      summary: Get workflows
      operationId: getWorkflows
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Workflow list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array

  # ===================== Enterprise (MSW mock) =====================
  /api/admin/tenants:
    get:
      tags: [admin-enterprise]
      summary: List tenants
      operationId: getTenants
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        domain:
                          type: string
                        status:
                          type: string
                          enum: [active, inactive]
                        userCount:
                          type: integer

  /api/admin/marketplace/agents:
    get:
      tags: [admin-enterprise]
      summary: List marketplace agents
      operationId: getMarketplaceAgents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Agent marketplace listing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        category:
                          type: string
                        rating:
                          type: number
                        installs:
                          type: integer
                        status:
                          type: string

  /api/admin/roles:
    get:
      tags: [admin-enterprise]
      summary: List RBAC roles
      operationId: getRoles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role list with permissions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        permissions:
                          type: array
                          items:
                            type: string
                        userCount:
                          type: integer

  /api/admin/permissions:
    get:
      tags: [admin-enterprise]
      summary: List permissions
      operationId: getPermissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Permission definitions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        group:
                          type: string

  /api/admin/sso/connections:
    get:
      tags: [admin-enterprise]
      summary: List SSO connections
      operationId: getSsoConnections
      security:
        - bearerAuth: []
      responses:
        '200':
          description: SSO connection list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        provider:
                          type: string
                        status:
                          type: string
                          enum: [active, inactive]
                        domain:
