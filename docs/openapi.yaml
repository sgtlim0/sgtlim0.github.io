  # ===================== AI Core (internal) =====================
  /health:
    get:
      tags: [health]
      summary: AI Core health check (internal)
      description: Direct health check on the AI Core FastAPI server.
      operationId: aiCoreHealth
      servers:
        - url: http://localhost:8000
      responses:
        '200':
          description: AI Core health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiCoreHealthResponse'

  /chat:
    post:
      tags: [chat]
      summary: AI Core chat (internal)
      description: |
        Direct chat endpoint on AI Core. Accepts up to 50,000-char messages.
        Supports prompt compression via the entropy encoder.
      operationId: aiCoreChat
      servers:
        - url: http://localhost:8000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  minLength: 1
                  maxLength: 50000
                history:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChatMessage'
                use_compression:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Chat response with compression stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Chat request failed

  /chat/stream:
    post:
      tags: [chat]
      summary: AI Core SSE stream (internal)
      description: |
        Direct streaming endpoint on AI Core. Returns `text/event-stream`.
        Each event: `data: <token>\n\n`. Ends with `data: [DONE]\n\n`.
        On error: `data: [ERROR] <message>\n\n`.
      operationId: aiCoreChatStream
      servers:
        - url: http://localhost:8000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  minLength: 1
                  maxLength: 50000
                history:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChatMessage'
                use_compression:
                  type: boolean
                  default: false
      responses:
        '200':
          description: SSE token stream.
          content:
            text/event-stream:
              schema:
                type: string
        '500':
          description: Internal server error.

  /analyze:
    post:
      tags: [analyze]
      summary: AI Core analyze (internal)
      description: |
        Direct text analysis endpoint on AI Core.
        Supports 4 modes: summarize, explain, research, translate.
      operationId: aiCoreAnalyze
      servers:
        - url: http://localhost:8000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, mode]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 50000
                mode:
                  type: string
                  enum: [summarize, explain, research, translate]
                url:
                  type: string
                title:
                  type: string
      responses:
        '200':
          description: Analysis result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
        '400':
          description: Unknown analysis mode.
        '500':
          description: Internal server error.

  /research:
    post:
      tags: [research]
      summary: AI Core research (internal)
      description: |
        Direct research pipeline endpoint on AI Core.
        Performs web search, page crawling, and AI summarization.
      operationId: aiCoreResearch
      servers:
        - url: http://localhost:8000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 1000
                num_sources:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 3
      responses:
        '200':
          description: Research results with sources.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchResponse'
        '500':
          description: Internal server error.
