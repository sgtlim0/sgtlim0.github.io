services:
  ai-core:
    build:
      context: ../apps/ai-core
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      DATABASE_URL: postgresql://${DB_USER:-hchat}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-hchat}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/00_init.sql
      - ./migrations:/docker-entrypoint-initdb.d/migrations
      - ./migrations:/migrations
      - ./seed.sql:/seed/seed.sql
      - ./seed.sh:/seed/seed.sh
    environment:
      POSTGRES_DB: ${DB_NAME:-hchat}
      POSTGRES_USER: ${DB_USER:-hchat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-hchat}']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

volumes:
  pgdata:
  redisdata:
