version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hchat
      POSTGRES_USER: hchat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hchat_dev_2026}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/00_init.sql
      - ./docker/migrations:/docker-entrypoint-initdb.d/migrations
      - ./docker/migrations:/migrations
      - ./docker/seed.sql:/seed/seed.sql
      - ./docker/seed.sh:/seed/seed.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hchat']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  ai-core:
    build:
      context: ./apps/ai-core
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://hchat:${POSTGRES_PASSWORD:-hchat_dev_2026}@postgres:5432/hchat
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
